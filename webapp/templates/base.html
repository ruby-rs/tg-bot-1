<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111417">
    <title>{% block title %}Трекер{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js" defer></script>
</head>
<body>
<div class="app">
    {% block header %}
    <header class="topbar">
        <span class="topbar-title">{% block heading %}Трекер{% endblock %}</span>
        {% block header_extra %}{% endblock %}
    </header>
    {% endblock %}

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    {% if active %}
    <nav class="bottomnav">
        <a href="/" class="{{ 'on' if active == 'panel' }}"><span>📋</span>Сегодня</a>
        <a href="/calendar" class="{{ 'on' if active == 'calendar' }}"><span>📅</span>Календарь</a>
        <a href="/weight" class="{{ 'on' if active == 'weight' }}"><span>⚖️</span>Вес</a>
        <a href="/expenses" class="{{ 'on' if active == 'expenses' }}"><span>💸</span>Расходы</a>
        <a href="/stats" class="{{ 'on' if active == 'stats' }}"><span>📊</span>Статы</a>
    </nav>
    {% endif %}
</div>
</body>
</html>
